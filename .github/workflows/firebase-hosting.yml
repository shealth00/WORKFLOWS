name: Deploy to Firebase Hosting

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - run: npm ci
      - run: npm ci --prefix functions
      - run: npm run typecheck
      - run: npm run build
      - run: npm run test

      - name: Detect auth mode
        id: auth_mode
        run: |
          if [ -n "${{ secrets.GCP_SA_KEY }}" ]; then
            echo "use_sa=true" >> "$GITHUB_OUTPUT"
            echo "Using GCP_SA_KEY service-account auth."
          else
            echo "use_sa=false" >> "$GITHUB_OUTPUT"
            echo "GCP_SA_KEY not set; using FIREBASE_TOKEN fallback."
          fi

      - name: Authenticate to Google Cloud (preferred)
        if: ${{ steps.auth_mode.outputs.use_sa == 'true' }}
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Deploy to Firebase (Hosting + Firestore rules + Functions)
        run: npx firebase-tools deploy --only hosting,firestore:rules,functions --non-interactive --project gen-lang-client-0777929601
        env:
          # Fallback path during migration; remove once service-account auth is verified stable.
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
