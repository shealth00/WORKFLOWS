name: Deploy to Firebase Hosting

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - run: npm ci
      - run: npm ci --prefix functions
      - run: npm run typecheck
      - run: npm run build
      - run: npm run test

      - name: Validate deploy auth secret
        run: |
          if [ -z "${{ secrets.GCP_SA_KEY }}" ]; then
            echo "Missing required GitHub secret: GCP_SA_KEY"
            echo "Add a JSON service-account key with deploy IAM roles, then rerun."
            exit 1
          fi

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}
          create_credentials_file: true
          export_environment_variables: true

      - name: Deploy to Firebase (Hosting + Firestore rules + Functions)
        run: npx firebase-tools deploy --only hosting,firestore:rules,functions --non-interactive --project gen-lang-client-0777929601
