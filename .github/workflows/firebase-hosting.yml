name: Deploy to Firebase Hosting

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - run: npm ci
      - run: npm run build

      - name: Deploy to Firebase (Hosting + Firestore rules)
        run: npx firebase-tools deploy --only hosting,firestore:rules --non-interactive --project gen-lang-client-0777929601
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
